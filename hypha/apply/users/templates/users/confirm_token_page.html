{% extends 'base-apply.html' %}

{% block content %}
  <form class="flex flex-col items-center mt-8 form" action="{{ request.path }}" method="post">
    <div class="form__group">
      {% for k, v in request.GET.items %}
        <input type="hidden" name="{{ k }}" value="{{v}}">
      {% endfor %}
      {% csrf_token %}
      <button class="btn btn-primary btn-xl" type="submit">
        {{ submit_text|default:"Confirm" }}
      </button>
    </div>
  </form>
{% endblock %}
